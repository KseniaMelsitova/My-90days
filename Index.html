<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff6b9d">
    <title>90 Дней</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23ff6b9d'/%3E%3Ctext x='90' y='115' font-family='Arial,sans-serif' font-size='80' font-weight='bold' fill='white' text-anchor='middle'%3E90%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ff6b9d'/%3E%3Ctext x='32' y='44' font-family='Arial,sans-serif' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3E90%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding: 16px;
            padding-bottom: 40px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .header .sub {
            font-size: 13px;
            color: #8e8e93;
        }
        .progress-wrap {
            margin-bottom: 16px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e5ea;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d 0%, #ffd93d 100%);
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .stat .num {
            font-size: 26px;
            font-weight: 800;
            color: #ff6b9d;
            line-height: 1;
        }
        .stat .lbl {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 4px;
        }
        .motivation {
            background: linear-gradient(135deg, #4ecdc4 0%, #2a9d8f 100%);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 10px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(78,205,196,0.25);
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 11px;
            color: #8e8e93;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
        .dot.pink { background: #ffb3c6; }
        .dot.yellow { background: #fff0a3; }
        .dot.done { background: #ff6b9d; }
        .dot.done2 { background: #ffd93d; }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .day {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 2px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .day:active { transform: scale(0.9); }
        .day.pink-zone { background: #ffb3c6; color: #c0392b; }
        .day.yellow-zone { background: #fff0a3; color: #b8860b; }
        .day.pink-zone.done { background: #ff6b9d; color: white; box-shadow: 0 2px 6px rgba(255,107,157,0.35); }
        .day.yellow-zone.done { background: #ffd93d; color: #2d3436; box-shadow: 0 2px 6px rgba(255,217,61,0.35); }
        .day.today { border-color: #2a9d8f; border-width: 2.5px; }
        .habits-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }
        .habits-card h3 {
            font-size: 15px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .habit {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 8px;
            background: #f5f5f7;
            transition: background 0.2s;
        }
        .habit:active { background: #e5e5ea; }
        .habit:last-child { margin-bottom: 0; }
        .check {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 2.5px solid #c7c7cc;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .check.checked {
            background: #34c759;
            border-color: #34c759;
        }
        .check.checked::after {
            content: '';
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }
        .habit-info { flex: 1; }
        .habit-name { font-weight: 700; font-size: 14px; }
        .habit-desc { font-size: 12px; color: #8e8e93; margin-top: 1px; }
        .habit-status {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: #ff9500;
            color: white;
        }
        .habit-status.done { background: #34c759; }
        .reset-wrap {
            text-align: center;
            margin-top: 20px;
        }
        .reset-btn {
            background: white;
            border: 1px solid #d1d1d6;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 13px;
            color: #8e8e93;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:active {
            background: #ff3b30;
            color: white;
            border-color: #ff3b30;
        }
        .confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        .confetti-piece {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 2px;
            animation: fall 2s ease-out forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 90 ДНЕЙ</h1>
        <div class="sub">Твой персональный трекер привычек</div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
    </div>

    <div class="stats">
        <div class="stat"><div class="num" id="sd">0</div><div class="lbl">Выполнено</div></div>
        <div class="stat"><div class="num" id="rd">90</div><div class="lbl">Осталось</div></div>
        <div class="stat"><div class="num" id="pd">0%</div><div class="lbl">Прогресс</div></div>
    </div>

    <div class="motivation">М О Л О Д Е Ц</div>

    <div class="legend">
        <span><span class="dot pink"></span>1–49</span>
        <span><span class="dot yellow"></span>50–90</span>
        <span><span class="dot done"></span>Сделано</span>
        <span><span class="dot" style="background:#2a9d8f;border:2px solid #2a9d8f"></span>Сегодня</span>
    </div>

    <div class="grid" id="g"></div>

    <div class="habits-card">
        <h3>📋 Привычки на сегодня</h3>
        <div id="hl"></div>
    </div>

    <div class="reset-wrap">
        <button class="reset-btn" onclick="ra()">🔄 Сбросить всё</button>
    </div>

    <script>
        const T=90;
        let cd=new Set();
        let hb=[
            {id:1,n:'Вес',d:'1600 ккал → 72 кг',c:false,cl:'#ff6b9d'},
            {id:2,n:'Финансы',d:'Работа + Экономия',c:false,cl:'#ffd93d'},
            {id:3,n:'QA + Ψ',d:'15 мин + 15 мин',c:false,cl:'#4ecdc4'},
            {id:4,n:'Зарядка',d:'8 т. шагов',c:false,cl:'#6bcb77'}
        ];

        function ld(){
            try{
                let s=localStorage.getItem('t90');
                if(s){
                    let d=JSON.parse(s);
                    cd=new Set(d.cd||[]);
                    if(d.hb) hb=d.hb;
                }
            }catch(e){}
        }
        function sv(){
            try{localStorage.setItem('t90',JSON.stringify({cd:Array.from(cd),hb:hb}));}catch(e){}
        }

        function rd(){
            let g=document.getElementById('g');
            g.innerHTML='';
            let next=cd.size+1;
            for(let i=1;i<=T;i++){
                let el=document.createElement('div');
                el.className='day'+(i<=49?' pink-zone':' yellow-zone');
                el.textContent=i;
                if(cd.has(i)) el.classList.add('done');
                if(i===next) el.classList.add('today');
                el.onclick=()=>td(i);
                g.appendChild(el);
            }
            us();
        }

        function td(i){
            if(cd.has(i)) cd.delete(i); else cd.add(i);
            sv(); rd();
            if(cd.size===T) confetti();
        }

        function us(){
            let c=cd.size, r=T-c, p=Math.round(c/T*100);
            document.getElementById('sd').textContent=c;
            document.getElementById('rd').textContent=r;
            document.getElementById('pd').textContent=p+'%';
            document.getElementById('pf').style.width=p+'%';
        }

        function rh(){
            let l=document.getElementById('hl');
            l.innerHTML='';
            hb.forEach(h=>{
                let d=document.createElement('div');
                d.className='habit';
                let cb=document.createElement('div');
                cb.className='check'+(h.c?' checked':'');
                cb.onclick=()=>th(h.id);
                let inf=document.createElement('div');
                inf.className='habit-info';
                inf.innerHTML='<div class="habit-name" style="color:'+h.cl+'">'+h.n+'</div><div class="habit-desc">'+h.d+'</div>';
                let st=document.createElement('div');
                st.className='habit-status'+(h.c?' done':'');
                st.textContent=h.c?'✅ Готово':'⏳ Ждёт';
                d.appendChild(cb); d.appendChild(inf); d.appendChild(st);
                l.appendChild(d);
            });
        }

        function th(id){
            let h=hb.find(x=>x.id===id);
            if(h){h.c=!h.c; sv(); rh();}
        }

        function ra(){
            if(confirm('Сбросить весь прогресс?')){
                cd.clear(); hb.forEach(h=>h.c=false); sv(); rd(); rh();
            }
        }

        function confetti(){
            let c=document.createElement('div');
            c.className='confetti';
            let colors=['#ff6b9d','#ffd93d','#4ecdc4','#6bcb77','#a29bfe','#ff9f43'];
            for(let i=0;i<60;i++){
                let p=document.createElement('div');
                p.className='confetti-piece';
                p.style.left=Math.random()*100+'vw';
                p.style.background=colors[Math.floor(Math.random()*colors.length)];
                p.style.animationDelay=Math.random()*1.5+'s';
                p.style.width=(4+Math.random()*8)+'px';
                p.style.height=(4+Math.random()*8)+'px';
                c.appendChild(p);
            }
            document.body.appendChild(c);
            setTimeout(()=>c.remove(),3000);
        }

        ld(); rd(); rh();
    </script>
</body>
</html>
