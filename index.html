<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff6b9d">
    <title>90 Дней</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23ff6b9d'/%3E%3Ctext x='90' y='115' font-family='Arial,sans-serif' font-size='80' font-weight='bold' fill='white' text-anchor='middle'%3E90%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ff6b9d'/%3E%3Ctext x='32' y='44' font-family='Arial,sans-serif' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3E90%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding: 16px;
            padding-bottom: 40px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .header .sub {
            font-size: 13px;
            color: #8e8e93;
        }
        .progress-wrap {
            margin-bottom: 16px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e5ea;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffb3c6 0%, #ffd6a5 14%, #fdffb6 28%, #caffbf 42%, #9bf6ff 56%, #a0c4ff 70%, #bdb2ff 84%, #ffc6ff 100%);
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .stat .num {
            font-size: 26px;
            font-weight: 800;
            color: #ff6b9d;
            line-height: 1;
        }
        .stat .lbl {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 4px;
        }
        .motivation {
            background: linear-gradient(135deg, #4ecdc4 0%, #2a9d8f 100%);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(78,205,196,0.25);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .day {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 2px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .day:active { transform: scale(0.9); }
        .day.today { border-color: #2a9d8f; border-width: 2.5px; }
        .day.done { color: white !important; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .habits-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }
        .habits-card h3 {
            font-size: 15px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .habit {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 8px;
            background: #f5f5f7;
            transition: background 0.2s;
        }
        .habit:active { background: #e5e5ea; }
        .habit:last-child { margin-bottom: 0; }
        .check {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 2.5px solid #c7c7cc;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .check.checked {
            background: #34c759;
            border-color: #34c759;
        }
        .check.checked::after {
            content: '';
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }
        .habit-info { flex: 1; }
        .habit-name { font-weight: 700; font-size: 14px; }
        .habit-desc { font-size: 12px; color: #8e8e93; margin-top: 1px; }
        .habit-status {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: #ff9500;
            color: white;
        }
        .habit-status.done { background: #34c759; }
        .weight-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }
        .weight-card h3 {
            font-size: 15px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .weight-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            align-items: center;
        }
        .weight-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .weight-input:focus {
            border-color: #ff6b9d;
        }
        .weight-btn {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .weight-btn:active {
            background: #e05585;
        }
        .weight-progress-wrap {
            margin-bottom: 10px;
        }
        .weight-progress-bar {
            width: 100%;
            height: 14px;
            background: #e5e5ea;
            border-radius: 7px;
            overflow: hidden;
        }
        .weight-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d 0%, #ff9f43 100%);
            border-radius: 7px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }
        .weight-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8e8e93;
        }
        .weight-stats .current {
            color: #ff6b9d;
            font-weight: 700;
            font-size: 14px;
        }
        .weight-stats .target {
            color: #34c759;
            font-weight: 700;
            font-size: 14px;
        }
        .weight-percent {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #ff6b9d;
            margin-top: 8px;
        }
        .weight-history {
            margin-top: 12px;
            max-height: 120px;
            overflow-y: auto;
        }
        .weight-history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        .weight-history-item:last-child { border-bottom: none; }
        .weight-history-item .date { color: #8e8e93; }
        .weight-history-item .val { font-weight: 700; color: #1c1c1e; }
        .reset-wrap {
            text-align: center;
            margin-top: 20px;
        }
        .reset-btn {
            background: white;
            border: 1px solid #d1d1d6;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 13px;
            color: #8e8e93;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:active {
            background: #ff3b30;
            color: white;
            border-color: #ff3b30;
        }
        .confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        .confetti-piece {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 2px;
            animation: fall 2s ease-out forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 90 ДНЕЙ</h1>
        <div class="sub">Твой персональный трекер привычек</div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
    </div>

    <div class="stats">
        <div class="stat"><div class="num" id="sd">0</div><div class="lbl">Выполнено</div></div>
        <div class="stat"><div class="num" id="rd">90</div><div class="lbl">Осталось</div></div>
        <div class="stat"><div class="num" id="pd">0%</div><div class="lbl">Прогресс</div></div>
    </div>

    <div class="motivation">ПРОСТО СДЕЛАЙ</div>

    <div class="grid" id="g"></div>

    <div class="weight-card">
        <h3>⚖️ Прогресс веса</h3>
        <div class="weight-input-row">
            <input type="number" step="0.1" class="weight-input" id="wi" placeholder="Вес сегодня" inputmode="decimal">
            <button class="weight-btn" onclick="sw()">✓</button>
        </div>
        <div class="weight-progress-wrap">
            <div class="weight-progress-bar"><div class="weight-progress-fill" id="wpf"></div></div>
        </div>
        <div class="weight-stats">
            <span>Старт: <span class="current" id="ws">86.2</span> кг</span>
            <span>Цель: <span class="target" id="wt">72</span> кг</span>
        </div>
        <div class="weight-percent" id="wpp">0%</div>
        <div class="weight-history" id="wh"></div>
    </div>

    <div class="habits-card">
        <h3>📋 Привычки на сегодня</h3>
        <div id="hl"></div>
    </div>

    <div class="reset-wrap">
        <button class="reset-btn" onclick="ra()">🔄 Сбросить всё</button>
    </div>

    <script>
        const T=90;
        const START_W=86.2;
        const TARGET_W=72;
        const ZONES=[
            {bg:'#ffb3c6',text:'#c0392b',done:'#ff6b9d',name:'1–10'},
            {bg:'#ffd6a5',text:'#b8860b',done:'#ff9f43',name:'11–20'},
            {bg:'#fdffb6',text:'#7d8b00',done:'#e9c46a',name:'21–30'},
            {bg:'#caffbf',text:'#2d6a00',done:'#6bcb77',name:'31–40'},
            {bg:'#9bf6ff',text:'#006b7d',done:'#4ecdc4',name:'41–50'},
            {bg:'#a0c4ff',text:'#003d8f',done:'#6a8cff',name:'51–60'},
            {bg:'#bdb2ff',text:'#4a0080',done:'#a29bfe',name:'61–70'},
            {bg:'#ffc6ff',text:'#8b0052',done:'#ff6b9d',name:'71–80'},
            {bg:'#ffcad4',text:'#8b0030',done:'#ff6b81',name:'81–90'}
        ];
        let cd=new Set();
        let hb=[
            {id:1,n:'Вес',d:'1600 ккал → 72 кг',c:false,cl:'#ff6b9d'},
            {id:2,n:'Финансы',d:'Работа 4ч + Экономия',c:false,cl:'#ffd93d'},
            {id:3,n:'QA + Ψ',d:'15 мин + 15 мин',c:false,cl:'#4ecdc4'},
            {id:4,n:'Тело мечты',d:'Зарядка + 8т шагов',c:false,cl:'#6bcb77'}
        ];
        let whistory=[];

        function getZone(day){ return Math.floor((day-1)/10); }

        function ld(){
            try{
                let s=localStorage.getItem('t90v7');
                if(s){
                    let d=JSON.parse(s);
                    cd=new Set(d.cd||[]);
                    if(d.hb) hb=d.hb;
                    if(d.wh) whistory=d.wh;
                }
            }catch(e){}
        }
        function sv(){
            try{localStorage.setItem('t90v7',JSON.stringify({cd:Array.from(cd),hb:hb,wh:whistory}));}catch(e){}
        }

        function rd(){
            let g=document.getElementById('g');
            g.innerHTML='';
            let next=cd.size+1;
            for(let i=1;i<=T;i++){
                let z=getZone(i);
                let zone=ZONES[z];
                let el=document.createElement('div');
                el.className='day';
                el.style.background=zone.bg;
                el.style.color=zone.text;
                el.textContent=i;
                if(cd.has(i)){
                    el.classList.add('done');
                    el.style.background=zone.done;
                }
                if(i===next) el.classList.add('today');
                el.onclick=()=>td(i);
                g.appendChild(el);
            }
            us();
        }

        function td(i){
            if(cd.has(i)) cd.delete(i); else cd.add(i);
            sv(); rd();
            if(cd.size===T) confetti();
        }

        function us(){
            let c=cd.size, r=T-c, p=Math.round(c/T*100);
            document.getElementById('sd').textContent=c;
            document.getElementById('rd').textContent=r;
            document.getElementById('pd').textContent=p+'%';
            document.getElementById('pf').style.width=p+'%';
        }

        function sw(){
            let inp=document.getElementById('wi');
            let v=parseFloat(inp.value);
            if(isNaN(v)||v<=0){alert('Введи вес, например 85.4');return;}
            let today=new Date().toLocaleDateString('ru-RU');
            whistory.unshift({date:today,val:v});
            if(whistory.length>30) whistory.pop();
            inp.value='';
            sv();
            uw();
        }

        function uw(){
            let last=whistory.length>0?whistory[0].val:START_W;
            let total=START_W-TARGET_W;
            let done=START_W-last;
            let pct=Math.max(0,Math.min(100,Math.round((done/total)*100)));
            document.getElementById('wpp').textContent=pct+'%';
            document.getElementById('wpf').style.width=pct+'%';
            document.getElementById('ws').textContent=START_W;
            document.getElementById('wt').textContent=TARGET_W;
            let h=document.getElementById('wh');
            h.innerHTML='';
            whistory.forEach(e=>{
                let it=document.createElement('div');
                it.className='weight-history-item';
                it.innerHTML='<span class="date">'+e.date+'</span><span class="val">'+e.val+' кг</span>';
                h.appendChild(it);
            });
        }

        function rh(){
            let l=document.getElementById('hl');
            l.innerHTML='';
            hb.forEach(h=>{
                let d=document.createElement('div');
                d.className='habit';
                let cb=document.createElement('div');
                cb.className='check'+(h.c?' checked':'');
                cb.onclick=()=>th(h.id);
                let inf=document.createElement('div');
                inf.className='habit-info';
                inf.innerHTML='<div class="habit-name" style="color:'+h.cl+'">'+h.n+'</div><div class="habit-desc">'+h.d+'</div>';
                let st=document.createElement('div');
                st.className='habit-status'+(h.c?' done':'');
                st.textContent=h.c?'✅ Готово':'⏳ Ждёт';
                d.appendChild(cb); d.appendChild(inf); d.appendChild(st);
                l.appendChild(d);
            });
        }

        function th(id){
            let h=hb.find(x=>x.id===id);
            if(h){h.c=!h.c; sv(); rh();}
        }

        function ra(){
            if(confirm('Сбросить весь прогресс?')){
                cd.clear(); hb.forEach(h=>h.c=false); whistory=[]; sv(); rd(); rh(); uw();
            }
        }

        function confetti(){
            let c=document.createElement('div');
            c.className='confetti';
            let colors=['#ffb3c6','#ffd6a5','#fdffb6','#caffbf','#9bf6ff','#a0c4ff','#bdb2ff','#ffc6ff'];
            for(let i=0;i<80;i++){
                let p=document.createElement('div');
                p.className='confetti-piece';
                p.style.left=Math.random()*100+'vw';
                p.style.background=colors[Math.floor(Math.random()*colors.length)];
                p.style.animationDelay=Math.random()*1.5+'s';
                p.style.width=(4+Math.random()*8)+'px';
                p.style.height=(4+Math.random()*8)+'px';
                c.appendChild(p);
            }
            document.body.appendChild(c);
            setTimeout(()=>c.remove(),3000);
        }

        ld(); rd(); rh(); uw();
    </script>
</body>
</html>
